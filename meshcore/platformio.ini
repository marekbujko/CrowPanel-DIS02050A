; ============================================================
; MeshCore + LVGL UI for CrowPanel DIS05020A v1.1
; ESP32-S3 + RGB panel + OPI PSRAM
; ============================================================

[platformio]
default_envs = crowpanel_v11_lvgl_chat

; ============================================================
; Base ESP32-S3 configuration
; ============================================================

[esp32_base]
platform = espressif32 @ 6.5.0
framework = arduino
board = esp32-s3-devkitc-1

upload_speed = 921600
monitor_speed = 115200

; Uncomment if you want fixed port
;upload_port = COM20
;monitor_port = COM20

; ---------- FLASH / PSRAM (CRITICAL FOR DIS05020A) ----------
board_build.flash_mode = qio
board_build.f_flash = 80000000
board_upload.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv

; ---------- PSRAM stability flags ----------
build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DRADIOLIB_STATIC_ONLY=1
  -DRADIOLIB_GODMODE=1

; ---------- Base source filter ----------
build_src_filter =
  +<*.cpp>
  +<helpers/*.cpp>
  +<helpers/radiolib/*.cpp>
  +<helpers/bridges/BridgeBase.cpp>
  +<helpers/ui/MomentaryButton.cpp>

; ---------- Base Libraries ----------
lib_deps =
  rweather/Crypto @ ^0.4.0
  jgromes/RadioLib @ ^7.3.0
  adafruit/RTClib @ ^2.1.4
  electroniccats/CayenneLPP @ ^1.3.0
  densaugeo/base64 @ ~1.4.0


; ============================================================
; CrowPanel DIS05020A Variant Configuration
; ============================================================

[CrowPanel_DIS05020A_v11]
extends = esp32_base

build_flags =
  ${esp32_base.build_flags}
  -I variants/crowpanel_dis05020a_v11

  ; ---- identify variant ----
  -D CROWPANEL_DIS05020A_V11

  ; ---- MeshCore radio wrapper ----
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper

  ; ---- SX1262 pins ----
  -D P_LORA_SCLK=5
  -D P_LORA_MISO=4
  -D P_LORA_MOSI=6
  -D P_LORA_NSS=8
  -D P_LORA_DIO_1=20
  -D P_LORA_RESET=19
  -D P_LORA_BUSY=2
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_RX_BOOSTED_GAIN=true
  -D SX126X_CURRENT_LIMIT=140

  ; ---- EU Narrow ----
  -D LORA_FREQ=869.618
  -D LORA_BW=62.5
  -D LORA_SF=8
  -D LORA_CR=8
  -D LORA_TX_POWER=22

  ; ---- device ----
  -D ADVERT_NAME='"KaA_CrowPanel"'
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40

build_src_filter =
  ${esp32_base.build_src_filter}
  +<../variants/crowpanel_dis05020a_v11>

lib_deps =
  ${esp32_base.lib_deps}


; ============================================================
; LVGL Screen Chat UI (SquareLine) + MeshCore bridge
; ============================================================

[env:crowpanel_v11_lvgl_chat]
extends = CrowPanel_DIS05020A_v11
extra_scripts = post:merge-bin.py

build_flags =
  ${CrowPanel_DIS05020A_v11.build_flags}
  -D FORCE_SX126X_DIO1_ACTION=1
  -I include
  -DFIRMWARE_VERSION=\"1.14.1\"
  -I src
  -I src/helpers
  -I src/helpers/radiolib
  -I variants/crowpanel_dis05020a_v11
  -I examples/crowpanel_lvgl_chat

build_src_filter =
  ${CrowPanel_DIS05020A_v11.build_src_filter}
  +<../examples/crowpanel_lvgl_chat/*.cpp>
  +<../examples/crowpanel_lvgl_chat/*.c>
  +<src/*>
  +<variants/crowpanel_dis05020a_v11/*>
  -<examples/>
  -<helpers/AutoDiscoverRTCClock.cpp>

lib_ldf_mode = deep+

lib_deps =
  ${CrowPanel_DIS05020A_v11.lib_deps}
  file://lib/LovyanGFX
  file://lib/lvgl
  me-no-dev/ESPAsyncWebServer @ ^1.2.3
  me-no-dev/AsyncTCP @ ^1.1.1
  https://github.com/fhessel/esp32_https_server/archive/refs/tags/v1.0.0.zip


; ============================================================
; RELEASE build — for distribution (works on 8MB and 16MB)
; ============================================================

[env:crowpanel_v11_lvgl_chat_release]
extends = crowpanel_v11_lvgl_chat
board_build.flash_mode = dio
board_build.f_flash = 40000000
board_upload.flash_size = detect
